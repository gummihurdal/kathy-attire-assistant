<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kathy Atelier Privé</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Encode the path and redirect to index.html with it as a query param
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/')[0] +
      '/?p=' + l.pathname.slice(1).split('/').map(encodeURIComponent).join('/') +
      (l.search ? '&q=' + l.search.slice(1).split('&').map(encodeURIComponent).join('&') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
